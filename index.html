    <style>

        --text: #f1f1ed;

        position: relative;
        z-index: 1;
      }

      .stage.empty {
        place-items: center;
      }

      .dropzone {
        display: grid;
        place-items: center;
        width: min(36rem, calc(100vw - 2rem));
        min-height: min(18rem, calc(100vh - 9rem));
        padding: 2rem;

  <body>
    <div id="root"></div>
    <script id="app-source" type="text/plain">
      const { useCallback, useEffect, useMemo, useRef, useState } = React;
      const dictionaryDefinitionCache = new Map<string, Promise<PreviewResult>>();

      type Cue = {
        index: number;
        startMs: number;
        endMs: number;
        text: string;
      };

      type Mode = "auto" | "strip" | "context";

      const REPOSITORY_URL = "https://github.com/nathanjhaveri/subtitle-def";
      const STORAGE_KEY = "subtitle-def:session:v1";
      const MODE_OPTIONS: { value: Mode; label: string; title: string }[] = [
        { value: "auto", label: "Auto", title: "Auto: use Bottom when the window is short, Side when it is tall." },
        { value: "strip", label: "Bottom", title: "Bottom: single-line view for placing the window under a video." },
        { value: "context", label: "Side", title: "Side: show previous and next lines for side-by-side viewing." }
      ];

      type ParseResult = {
        cues: Cue[];
        warning: string;
      };

      type StoredSession = {
        fileName: string;
        srtText: string;
        timeMs: number;
        mode: Mode;
        updatedAt: number;
      };

      type PreviewResult = {
        html: string;
        source: "local" | "missing" | "error" | "unavailable";
      };

      type LocalDictionaryEntry = [string, string];

      type LocalDictionaryPayload = {
        v: number;
        format: string;
        source: string;
        generatedAt: string;
        e: LocalDictionaryEntry[];
        l: Record<string, number | number[]>;
      };

      const DICTIONARY_SCRIPT_URL = "assets/dictionary/fr-fr-v1.js";
      const DICTIONARY_CACHE_KEY = "fr-fr-v1.js:gzip-bytes";
      const DICTIONARY_DB_NAME = "subtitle-def:dictionary:v1";
      const DICTIONARY_STORE_NAME = "files";
      const FRENCH_ELISION_PREFIX_RE = /^(?:[cdjlmnst]|qu)['’](?=.)/;
      let localDictionaryPromise: Promise<LocalDictionaryPayload | null> | null = null;
      let dictionaryBytesPromise: Promise<Uint8Array> | null = null;
      let dictionaryDbPromise: Promise<IDBDatabase | null> | null = null;
      let dictionaryLoadError = "";
      let importedDictionaryBytes: Uint8Array | null = null;

      // SRT is a sequence of cue blocks separated by blank lines:
      // optional numeric index, "start --> end", then one or more text lines.
      // This local parser avoids a runtime module import so file loading works from disk.
      function parseSrtTimestamp(value: string): number | null {
        const token = value.trim().split(/\s+/)[0];
        const full = token.match(/^(\d+):([0-5]?\d):([0-5]?\d)(?:[,.](\d{1,3}))?$/);
        const short = token.match(/^([0-5]?\d):([0-5]?\d)(?:[,.](\d{1,3}))?$/);
        if (!full && !short) return null;

        const hours = full ? Number(full[1]) : 0;
        const minutes = Number(full ? full[2] : short![1]);
        const seconds = Number(full ? full[3] : short![2]);
        const fraction = full ? full[4] : short![3];
        const milliseconds = fraction ? Number(fraction.padEnd(3, "0").slice(0, 3)) : 0;
        return (hours * 3600 + minutes * 60 + seconds) * 1000 + milliseconds;
      }

      async function parseSrt(text: string): Promise<ParseResult> {
        const warnings: string[] = [];
        const normalized = text
          .replace(/^\uFEFF/, "")
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n");
        const blocks = normalized.split(/\n{2,}/);
        const cues: Cue[] = [];
        let skipped = 0;

        for (const block of blocks) {
          const lines = block
            .split("\n")
            .map((line) => line.replace(/^\uFEFF/, ""))
            .filter((line, index, all) => line.trim() || index > 0 && index < all.length - 1);
          if (!lines.some((line) => line.trim())) continue;

          const timingLineIndex = lines.findIndex((line) => line.includes("-->"));
          if (timingLineIndex === -1) {
            skipped += 1;
            continue;
          }

          const [rawStart, rawEnd] = lines[timingLineIndex].split(/\s*-->\s*/, 2);
          const startMs = parseSrtTimestamp(rawStart || "");
          const endMs = parseSrtTimestamp(rawEnd || "");
          const cueText = lines.slice(timingLineIndex + 1).join("\n").trim();

          if (startMs === null || endMs === null || endMs < startMs || !cueText) {
            skipped += 1;
            continue;
          }

          cues.push({
            index: cues.length,
            startMs,
            endMs,
            text: cueText
          });
        }

        cues.sort((a: Cue, b: Cue) => a.startMs - b.startMs || a.endMs - b.endMs);

        if (cues.length === 0) {
          throw new Error("No valid SRT cues were found.");
        }

        if (skipped > 0) {
          warnings.push(`${skipped} malformed SRT block${skipped === 1 ? " was" : "s were"} skipped.`);
        }

        for (let i = 1; i < cues.length; i += 1) {
          if (cues[i].startMs < cues[i - 1].endMs) {
            warnings.push("Overlapping cues were preserved.");
            break;
          }
        }

        return { cues, warning: warnings.join(" ") };
      }

      function isMode(value: unknown): value is Mode {
        return value === "auto" || value === "strip" || value === "context";
      }

      function readStoredSession(): StoredSession | null {
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed.srtText !== "string" || !parsed.srtText.trim()) return null;
          return {
            fileName: typeof parsed.fileName === "string" && parsed.fileName ? parsed.fileName : "Restored subtitles.srt",
            srtText: parsed.srtText,
            timeMs: Number.isFinite(Number(parsed.timeMs)) ? Number(parsed.timeMs) : 0,
            mode: isMode(parsed.mode) ? parsed.mode : "auto",
            updatedAt: Number.isFinite(Number(parsed.updatedAt)) ? Number(parsed.updatedAt) : Date.now()
          };
        } catch (error) {
          console.warn("Could not read saved subtitle session.", error);
          return null;
        }
      }

      function writeStoredSession(session: StoredSession) {
        try {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
        } catch (error) {
          console.warn("Could not save subtitle session.", error);
        }
      }

      function clearStoredSession() {
        try {
          window.localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          console.warn("Could not clear saved subtitle session.", error);
        }
      }

      function formatTime(ms: number): string {
        const clamped = Math.max(0, Math.floor(ms / 1000));
        const hours = Math.floor(clamped / 3600);
        const minutes = Math.floor((clamped % 3600) / 60);
        const seconds = clamped % 60;
        const two = (value: number) => String(value).padStart(2, "0");
        return hours > 0 ? `${hours}:${two(minutes)}:${two(seconds)}` : `${minutes}:${two(seconds)}`;
      }

      function findActiveCueIndex(cues: Cue[], timeMs: number): number {
        let low = 0;
        let high = cues.length;
        while (low < high) {
          const mid = Math.floor((low + high) / 2);
          if (timeMs < cues[mid].endMs) {
            high = mid;
          } else {
            low = mid + 1;
          }
        }
        return cues[low] && timeMs >= cues[low].startMs ? low : -1;
      }

      function nearestCueIndex(cues: Cue[], activeIndex: number, timeMs: number): number {
        if (activeIndex >= 0) return activeIndex;
        let next = cues.findIndex((cue) => cue.startMs > timeMs);
        if (next === -1) return cues.length - 1;
        return Math.max(0, next - 1);
      }

      function useSmallHeight(): boolean {
        const [small, setSmall] = useState(() => window.innerHeight <= 520);
        useEffect(() => {
          const onResize = () => setSmall(window.innerHeight <= 520);
          window.addEventListener("resize", onResize);
          return () => window.removeEventListener("resize", onResize);
        }, []);
        return small;
      }

      function getLayoutClass(mode: Mode, smallHeight: boolean): string {
        if (mode === "strip") return "layout-strip";
        if (mode === "context") return "layout-context";
        return smallHeight ? "layout-strip" : "layout-context";
      }

      function normalizeWord(word: string): string {
        const normalized = word.trim().replace(/^['’]+|['’]+$/g, "").toLocaleLowerCase("fr");
        return normalized.replace(FRENCH_ELISION_PREFIX_RE, "");
      }

      function escapeHtml(value: string): string {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function sanitizeDefinitionHtml(html: string): string {
        const parser = new DOMParser();
        const document = parser.parseFromString(`<div>${html}</div>`, "text/html");
        const allowed = new Set(["b", "br", "div", "em", "i", "li", "ol", "p", "span", "strong", "ul"]);

        const cleanNode = (node: Node): Node | null => {
          if (node.nodeType === Node.TEXT_NODE) {
            return document.createTextNode(node.textContent || "");
          }
          if (node.nodeType !== Node.ELEMENT_NODE) return null;
          const element = node as Element;
          const tag = element.tagName.toLowerCase();
          if (!allowed.has(tag)) {
            const fragment = document.createDocumentFragment();
            element.childNodes.forEach((child) => {
              const cleaned = cleanNode(child);
              if (cleaned) fragment.appendChild(cleaned);
            });
            return fragment;
          }

          const cleanedElement = document.createElement(tag);
          element.childNodes.forEach((child) => {
            const cleaned = cleanNode(child);
            if (cleaned) cleanedElement.appendChild(cleaned);
          });
          return cleanedElement;
        };

        const container = document.createElement("div");
        document.body.firstElementChild?.childNodes.forEach((child) => {
          const cleaned = cleanNode(child);
          if (cleaned) container.appendChild(cleaned);
        });
        return container.innerHTML;
      }

      function resetDictionaryRuntimeCaches() {
        dictionaryDefinitionCache.clear();
        localDictionaryPromise = null;
        dictionaryBytesPromise = null;
        dictionaryLoadError = "";
      }

      function base64ToBytes(base64: string): Uint8Array {
        const binary = window.atob(base64.replace(/\s+/g, ""));
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }

      function openDictionaryDb(): Promise<IDBDatabase | null> {
        if (dictionaryDbPromise) return dictionaryDbPromise;
        dictionaryDbPromise = new Promise((resolve) => {
          if (!window.indexedDB) {
            resolve(null);
            return;
          }
          const request = window.indexedDB.open(DICTIONARY_DB_NAME, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(DICTIONARY_STORE_NAME)) {
              db.createObjectStore(DICTIONARY_STORE_NAME);
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => {
            console.warn("Could not open dictionary cache.", request.error);
            resolve(null);
          };
        });
        return dictionaryDbPromise;
      }

      async function readDictionaryCachedBytes(): Promise<Uint8Array | null> {
        const db = await openDictionaryDb();
        if (!db) return null;
        return new Promise((resolve) => {
          const transaction = db.transaction(DICTIONARY_STORE_NAME, "readonly");
          const request = transaction.objectStore(DICTIONARY_STORE_NAME).get(DICTIONARY_CACHE_KEY);
          request.onsuccess = () => {
            const result = request.result;
            if (result instanceof Uint8Array) {
              resolve(result);
            } else if (result instanceof ArrayBuffer) {
              resolve(new Uint8Array(result));
            } else {
              resolve(null);
            }
          };
          request.onerror = () => resolve(null);
        });
      }

      async function writeDictionaryCachedBytes(bytes: Uint8Array): Promise<void> {
        const db = await openDictionaryDb();
        if (!db) return;
        await new Promise<void>((resolve) => {
          const transaction = db.transaction(DICTIONARY_STORE_NAME, "readwrite");
          transaction.objectStore(DICTIONARY_STORE_NAME).put(bytes, DICTIONARY_CACHE_KEY);
          transaction.oncomplete = () => resolve();
          transaction.onerror = () => {
            console.warn("Could not cache dictionary file.", transaction.error);
            resolve();
          };
        });
      }

      function loadDictionaryScriptBytes(): Promise<Uint8Array> {
        return new Promise((resolve, reject) => {
          const existing = (window as Window & { __subtitleDefDictionaryDataBase64?: string }).__subtitleDefDictionaryDataBase64;
          if (existing) {
            resolve(base64ToBytes(existing));
            return;
          }

          const host = window as Window & {
            __subtitleDefDictionaryDataBase64?: string;
            __subtitleDefDictionaryDataLoaded?: (base64: string) => void;
          };
          const previousCallback = host.__subtitleDefDictionaryDataLoaded;
          const script = document.createElement("script");

          const cleanup = () => {
            script.remove();
            host.__subtitleDefDictionaryDataLoaded = previousCallback;
          };

          host.__subtitleDefDictionaryDataLoaded = (base64: string) => {
            host.__subtitleDefDictionaryDataBase64 = base64;
            cleanup();
            resolve(base64ToBytes(base64));
          };

          script.src = DICTIONARY_SCRIPT_URL;
          script.async = true;
          script.onerror = () => {
            cleanup();
            reject(new Error("Dictionary file unavailable."));
          };
          document.head.appendChild(script);
        });
      }

      async function loadDictionaryBytes(): Promise<Uint8Array> {
        if (!dictionaryBytesPromise) {
          dictionaryBytesPromise = (async () => {
            if (importedDictionaryBytes) return importedDictionaryBytes;
            const cached = await readDictionaryCachedBytes();
            if (cached) return cached;

            const bytes = await loadDictionaryScriptBytes();
            await writeDictionaryCachedBytes(bytes);
            return bytes;
          })();
        }
        return dictionaryBytesPromise;
      }

      async function loadLocalDictionary(): Promise<LocalDictionaryPayload | null> {
        if (!localDictionaryPromise) {
          localDictionaryPromise = (async () => {
            if (!window.fflate?.gunzipSync) {
              throw new Error("Dictionary decompression is unavailable.");
            }
            const compressed = await loadDictionaryBytes();
            const inflated = window.fflate.gunzipSync(compressed);
            const json = new TextDecoder("utf-8").decode(inflated);
            const dictionary = JSON.parse(json);
            if (dictionary?.format !== "subtitle-def-dictionary" || !dictionary.e || !dictionary.l) {
              throw new Error("Dictionary file has an unsupported format.");
            }
            return dictionary as LocalDictionaryPayload;
          })().catch((error) => {
            dictionaryLoadError = error instanceof Error ? error.message : "Dictionary lookup unavailable.";
            console.warn("Could not load local dictionary.", error);
            return null;
          });
        }
        return localDictionaryPromise;
      }

      function wiktionaryUrl(headword: string): string {
        return `https://fr.wiktionary.org/wiki/${encodeURIComponent(headword)}`;
      }

      function renderDefinitionEntry([headword, definition]: LocalDictionaryEntry): string {
        const safeHeadword = escapeHtml(headword);
        const safeUrl = escapeHtml(wiktionaryUrl(headword));
        return [
          `<div class="definition-entry">`,
          `<div class="definition-entry-header">`,
          `<div class="definition-head">${safeHeadword}</div>`,
          `<a class="definition-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">Wiktionary</a>`,
          `</div>`,
          sanitizeDefinitionHtml(definition),
          `</div>`
        ].join("");
      }

      async function lookupDictionaryDefinition(word: string): Promise<PreviewResult> {
        const normalized = normalizeWord(word);
        if (!normalized) {
          return { html: "No word selected.", source: "error" };
        }
        if (!dictionaryDefinitionCache.has(normalized)) {
          dictionaryDefinitionCache.set(normalized, loadLocalDictionary().then((dictionary) => {
            if (!dictionary) {
              const unavailable = dictionaryLoadError.includes("unavailable");
              return {
                html: unavailable ? "Dictionary file unavailable." : escapeHtml(dictionaryLoadError || "Local dictionary unavailable."),
                source: unavailable ? "unavailable" as const : "error" as const
              };
            }

            const rawMatches = dictionary.l[normalized];
            const matches = typeof rawMatches === "number" ? [rawMatches] : rawMatches;
            if (!matches?.length) {
              return { html: `No local entry for ${escapeHtml(normalized)}.`, source: "missing" as const };
            }

            const entries = matches
              .slice(0, 3)
              .map((entryIndex) => dictionary.e[entryIndex])
              .filter(Boolean);

            if (!entries.length) {
              return { html: `No local entry for ${escapeHtml(normalized)}.`, source: "missing" as const };
            }

            return { html: entries.map(renderDefinitionEntry).join(""), source: "local" as const };
          }).catch((error) => {
            return {
              html: escapeHtml(error instanceof Error ? error.message : "Dictionary lookup unavailable."),
              source: "error" as const
            };
          }));
        }
        return dictionaryDefinitionCache.get(normalized)!;
      }

      async function importDictionaryFiles(files: FileList | null): Promise<number> {
        if (!files?.length) return 0;
        const file = Array.from(files).find((candidate) => candidate.name.endsWith(".js") || candidate.name.endsWith(".json.gz") || candidate.name.endsWith(".gz"));
        if (!file) return 0;
        let bytes: Uint8Array;
        if (file.name.endsWith(".js")) {
          const text = await file.text();
          const start = text.indexOf("const chunks = [");
          const end = start === -1 ? -1 : text.indexOf("];", start);
          if (start === -1 || end === -1) throw new Error("Dictionary script has an unsupported format.");
          const chunkText = text.slice(start, end);
          const chunks = Array.from(chunkText.matchAll(/"([A-Za-z0-9+/=]+)"/g), (match) => match[1]);
          if (!chunks.length) throw new Error("Dictionary script has an unsupported format.");
          bytes = base64ToBytes(chunks.join(""));
        } else {
          bytes = new Uint8Array(await file.arrayBuffer());
        }
        importedDictionaryBytes = bytes;
        await writeDictionaryCachedBytes(bytes);
        resetDictionaryRuntimeCaches();
        importedDictionaryBytes = bytes;
        return 1;
      }

      type TextSegment = {
        text: string;
        style: React.CSSProperties;
      };

      function sanitizedColor(value: string | null): string | undefined {
        const color = (value || "").trim();
        if (!color) return undefined;
        if (window.CSS?.supports?.("color", color)) return color;
        return undefined;
      }

      function styleForElement(element: Element, inherited: React.CSSProperties): React.CSSProperties {
        const style = { ...inherited };
        const tag = element.tagName.toLowerCase();
        if (tag === "font") {
          const color = sanitizedColor(element.getAttribute("color"));
          if (color) style.color = color;
        }
        if (tag === "b" || tag === "strong") style.fontWeight = 800;
        if (tag === "i" || tag === "em") style.fontStyle = "italic";
        if (tag === "u") style.textDecoration = "underline";
        return style;
      }

      function parseSubtitleMarkup(text: string): TextSegment[] {
        const parser = new DOMParser();
        const document = parser.parseFromString(`<div>${text}</div>`, "text/html");
        const root = document.body.firstElementChild;
        const segments: TextSegment[] = [];

        const walk = (node: Node, style: React.CSSProperties) => {
          if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent) segments.push({ text: node.textContent, style });
            return;
          }

          if (node.nodeType !== Node.ELEMENT_NODE) return;
          const element = node as Element;
          const tag = element.tagName.toLowerCase();
          if (tag === "script" || tag === "style") return;
          const childStyle = styleForElement(element, style);
          element.childNodes.forEach((child) => walk(child, childStyle));
        };

        if (root) root.childNodes.forEach((child) => walk(child, {}));
        return segments.length ? segments : [{ text, style: {} }];
      }

      function WordToken({
        word,
        style,
        selectedWord,
        onSelectWord
      }: {
        word: string;
        style?: React.CSSProperties;
        selectedWord: string;
        onSelectWord: (word: string) => void;
      }) {
        const selected = normalizeWord(word) === normalizeWord(selectedWord);

        const select = useCallback(() => {
          onSelectWord(word);
        }, [onSelectWord, word]);

        return (
          <button
            className={`word-button ${selected ? "selected" : ""}`}
            type="button"
            style={style}
            onClick={(event) => {
              event.stopPropagation();
              select();
            }}
          >
            {word}
          </button>
        );
      }

      function SubtitleText({
        text,
        selectedWord,
        onSelectWord
      }: {
        text: string;
        selectedWord: string;
        onSelectWord: (word: string) => void;
      }) {
        const wordPattern = /[\p{L}\p{M}]+(?:[’'][\p{L}\p{M}]+)?/gu;
        const renderSegment = (segment: TextSegment, segmentKey: string) => {
          const parts: React.ReactNode[] = [];
          let lastIndex = 0;
          for (const match of segment.text.matchAll(wordPattern)) {
            const word = match[0];
            const index = match.index || 0;
            if (index > lastIndex) {
              parts.push(
                <span key={`${segmentKey}-text-${lastIndex}`} style={segment.style}>
                  {segment.text.slice(lastIndex, index)}
                </span>
              );
            }
            parts.push(
              <WordToken
                key={`${segmentKey}-word-${index}-${word}`}
                word={word}
                style={segment.style}
                selectedWord={selectedWord}
                onSelectWord={onSelectWord}
              />
            );
            lastIndex = index + word.length;
          }
          if (lastIndex < segment.text.length) {
            parts.push(
              <span key={`${segmentKey}-text-${lastIndex}`} style={segment.style}>
                {segment.text.slice(lastIndex)}
              </span>
            );
          }
          return parts;
        };

        const lines = text.split(/\n/);
        return (
          <>
            {lines.map((line, lineIndex) => (
              <React.Fragment key={lineIndex}>
                {parseSubtitleMarkup(line).map((segment, segmentIndex) => (
                  <React.Fragment key={`${lineIndex}-${segmentIndex}`}>
                    {renderSegment(segment, `${lineIndex}-${segmentIndex}`)}
                  </React.Fragment>
                ))}
                {lineIndex < lines.length - 1 ? <br /> : null}
              </React.Fragment>
            ))}
          </>
        );
      }

      function DropZone({
        onLoad,
        error
      }: {
        onLoad: (file: File) => void;
        error: string;
      }) {
        const [dragging, setDragging] = useState(false);
        const inputRef = useRef<HTMLInputElement | null>(null);

        const pick = () => inputRef.current?.click();
        const onFiles = (files: FileList | null) => {
          const file = files && files[0];
          if (file) onLoad(file);
        };

        return (
          <div
            className={`dropzone ${dragging ? "dragging" : ""}`}
            onDragOver={(event) => {
              event.preventDefault();
              setDragging(true);
            }}
            onDragLeave={() => setDragging(false)}
            onDrop={(event) => {
              event.preventDefault();
              setDragging(false);
              onFiles(event.dataTransfer.files);
            }}
          >
            <div>
              <button className="load-button" type="button" onClick={pick}>
                Drop or select .srt file
              </button>
              <input
                ref={inputRef}
                className="hidden-input"
                type="file"
                accept=".srt,text/plain"
                onChange={(event) => onFiles(event.currentTarget.files)}
              />
              {error ? <div className="message">{error}</div> : null}
            </div>
          </div>
        );
      }

      function CueLine({
        cue,
        current,
        onJump,
        selectedWord,
        onSelectWord
      }: {
        cue: Cue;
        current?: boolean;
        onJump: (timeMs: number) => void;
        selectedWord: string;
        onSelectWord: (word: string) => void;
      }) {
        return (
          <div
            className={`cue-line ${current ? "current" : "context"}`}
            role="button"
            tabIndex={0}
            onClick={() => onJump(cue.startMs)}
            onKeyDown={(event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                onJump(cue.startMs);
              }
            }}
          >
            <span className="cue-time">{formatTime(cue.startMs)}</span>
            <SubtitleText text={cue.text} selectedWord={selectedWord} onSelectWord={onSelectWord} />
          </div>
        );
      }

      function Lyrics({
        cues,
        timeMs,
        onJump,
        smallHeight,
        selectedWord,
        onSelectWord
      }: {
        cues: Cue[];
        timeMs: number;
        onJump: (timeMs: number) => void;
        smallHeight: boolean;
        selectedWord: string;
        onSelectWord: (word: string) => void;
      }) {
        const activeIndex = findActiveCueIndex(cues, timeMs);
        const baseIndex = nearestCueIndex(cues, activeIndex, timeMs);
        const primaryIndex = smallHeight ? baseIndex : activeIndex;
        const contextSize = smallHeight ? 0 : 3;
        const start = Math.max(0, baseIndex - contextSize);
        const end = Math.min(cues.length - 1, baseIndex + contextSize);
        const visible = [];
        for (let i = start; i <= end; i += 1) visible.push({ cue: cues[i], index: i });

        return (
          <div className="lyrics" aria-live="polite">
            {visible.map(({ cue, index }) => (
              <CueLine
                key={`${cue.startMs}-${index}`}
                cue={cue}
                current={index === primaryIndex}
                onJump={onJump}
                selectedWord={selectedWord}
                onSelectWord={onSelectWord}
              />
            ))}
            {activeIndex === -1 && !smallHeight ? (
              <div className="cue-line current empty-current">
                {cues.length ? "..." : "Load subtitles to begin"}
              </div>
            ) : null}
          </div>
        );
      }

      function DefinitionPanel({ word }: { word: string }) {
        const [status, setStatus] = useState<"idle" | "loading" | "ready" | "error">("idle");
        const [result, setResult] = useState<PreviewResult | null>(null);
        const [importing, setImporting] = useState(false);
        const [importMessage, setImportMessage] = useState("");
        const importInputRef = useRef<HTMLInputElement | null>(null);
        const normalized = normalizeWord(word);

        const resolveLookup = useCallback((lookupWord: string) => {
          setStatus("loading");
          setResult(null);
          return lookupDictionaryDefinition(lookupWord)
            .then((value) => {
              setResult(value);
              setStatus(value.source === "error" ? "error" : "ready");
            })
            .catch((error) => {
              setResult({
                html: escapeHtml(error instanceof Error ? error.message : "Dictionary lookup unavailable."),
                source: "error"
              });
              setStatus("error");
            });
        }, []);

        const onImportDictionary = useCallback(async (files: FileList | null) => {
          setImporting(true);
          setImportMessage("");
          try {
            const imported = await importDictionaryFiles(files);
            if (!imported) {
              setImportMessage("Select fr-fr-v1.js.");
              return;
            }
            setImportMessage("Dictionary imported.");
            if (normalized) await resolveLookup(word);
          } catch (error) {
            setImportMessage(error instanceof Error ? error.message : "Dictionary import failed.");
          } finally {
            setImporting(false);
          }
        }, [normalized, resolveLookup, word]);

        useEffect(() => {
          let cancelled = false;
          if (!normalized) {
            setStatus("idle");
            setResult(null);
            return;
          }

          setStatus("loading");
          setResult(null);
          lookupDictionaryDefinition(word)
            .then((value) => {
              if (cancelled) return;
              setResult(value);
              setStatus(value.source === "error" ? "error" : "ready");
            })
            .catch((error) => {
              if (cancelled) return;
              setResult({
                html: escapeHtml(error instanceof Error ? error.message : "Dictionary lookup unavailable."),
                source: "error"
              });
              setStatus("error");
            });

          return () => {
            cancelled = true;
          };
        }, [normalized, word]);

        const title = normalized || "Dictionnaire";
        const html = status === "idle" ? "..." : status === "loading" ? "Loading..." : (result?.html || "No local entry.");
        const showImport = result?.source === "unavailable";

        return (
          <aside className="definition-panel" aria-live="polite">
            <div className="definition-kicker">French dictionary</div>
            <div className="definition-title">{title}</div>
            <div
              className={`definition-content ${status === "loading" || status === "idle" ? "definition-status" : ""}`}
              dangerouslySetInnerHTML={{ __html: html }}
            />
            {showImport ? (
              <>
                <button
                  className="dictionary-import-button"
                  type="button"
                  disabled={importing}
                  onClick={() => importInputRef.current?.click()}
                >
                  {importing ? "Importing..." : "Import dictionary file"}
                </button>
                <input
                  ref={importInputRef}
                  className="hidden-input"
                  type="file"
                  accept=".js,.gz,text/javascript,application/javascript,application/gzip"
                  onChange={(event) => {
                    onImportDictionary(event.currentTarget.files);
                    event.currentTarget.value = "";
                  }}
                />
                {importMessage ? <div className="hint">{importMessage}</div> : null}
              </>
            ) : null}
          </aside>
        );
      }

      function App() {
        const [cues, setCues] = useState<Cue[]>([]);
        const [fileName, setFileName] = useState("");
        const [sourceText, setSourceText] = useState("");
        const [timeMs, setTimeMs] = useState(0);
        const [playing, setPlaying] = useState(false);
        const [selectedWord, setSelectedWord] = useState("");
        const [mode, setMode] = useState<Mode>("auto");
        const [error, setError] = useState("");
        const [warning, setWarning] = useState("");
        const [restoring, setRestoring] = useState(true);
        const smallHeight = useSmallHeight();
        const startedAtRef = useRef(0);
        const startedFromRef = useRef(0);
        const latestSessionRef = useRef<StoredSession | null>(null);
        const durationMs = cues.length ? cues[cues.length - 1].endMs : 0;

        useEffect(() => {
          const stored = readStoredSession();
          if (!stored) {
            setRestoring(false);
            return;
          }

          let cancelled = false;
          setMode(stored.mode);
          parseSrt(stored.srtText)
            .then((result) => {
              if (cancelled) return;
              const maxTime = result.cues[result.cues.length - 1]?.endMs ?? 0;
              setCues(result.cues);
              setFileName(stored.fileName);
              setSourceText(stored.srtText);
              setTimeMs(Math.max(0, Math.min(maxTime, stored.timeMs)));
              setWarning(result.warning);
            })
            .catch((restoreError) => {
              if (cancelled) return;
              clearStoredSession();
              setError(`Saved subtitles could not be restored: ${restoreError instanceof Error ? restoreError.message : String(restoreError)}`);
            })
            .finally(() => {
              if (!cancelled) setRestoring(false);
            });

          return () => {
            cancelled = true;
          };
        }, []);

        useEffect(() => {
          if (!sourceText || !cues.length) {
            latestSessionRef.current = null;
            return;
          }

          latestSessionRef.current = {
            fileName,
            srtText: sourceText,
            timeMs,
            mode,
            updatedAt: Date.now()
          };

          if (!playing) {
            writeStoredSession(latestSessionRef.current);
          }
        }, [sourceText, fileName, timeMs, mode, cues.length, playing]);

        useEffect(() => {
          if (!playing) return;
          const id = window.setInterval(() => {
            if (latestSessionRef.current) writeStoredSession(latestSessionRef.current);
          }, 1000);
          return () => window.clearInterval(id);
        }, [playing]);

        useEffect(() => {
          const saveBeforeUnload = () => {
            if (latestSessionRef.current) writeStoredSession(latestSessionRef.current);
          };
          window.addEventListener("beforeunload", saveBeforeUnload);
          return () => window.removeEventListener("beforeunload", saveBeforeUnload);
        }, []);

        useEffect(() => {
          if (!playing) return;
          startedAtRef.current = performance.now();
          startedFromRef.current = timeMs;
          let frame = 0;
          const tick = (now: number) => {
            const next = Math.min(durationMs, startedFromRef.current + now - startedAtRef.current);
            setTimeMs(next);
            if (next >= durationMs) {
              setPlaying(false);
              return;
            }
            frame = requestAnimationFrame(tick);
          };
          frame = requestAnimationFrame(tick);
          return () => cancelAnimationFrame(frame);
        }, [playing, durationMs]);

        const setTime = useCallback((value: number) => {
          const next = Math.max(0, Math.min(durationMs, value));
          setTimeMs(next);
          if (playing) {
            startedAtRef.current = performance.now();
            startedFromRef.current = next;
          }
        }, [durationMs, playing]);

        const loadFile = useCallback(async (file: File) => {
          setPlaying(false);
          setError("");
          setWarning("");
          setSourceText("");
          try {
            const text = await file.text();
            const result = await parseSrt(text);
            setCues(result.cues);
            setFileName(file.name);
            setSourceText(text);
            setTimeMs(0);
            setSelectedWord("");
            setWarning(result.warning);
          } catch (loadError) {
            setError(loadError instanceof Error ? loadError.message : String(loadError));
          }
        }, []);

        const resetSession = useCallback(() => {
          setPlaying(false);
          setCues([]);
          setFileName("");
          setSourceText("");
          setTimeMs(0);
          setSelectedWord("");
          setWarning("");
          setError("");
          latestSessionRef.current = null;
          clearStoredSession();
        }, []);

        const jumpCue = useCallback((direction: -1 | 1) => {
          if (!cues.length) return;
          const active = findActiveCueIndex(cues, timeMs);
          const base = nearestCueIndex(cues, active, timeMs);
          const nextIndex = Math.max(0, Math.min(cues.length - 1, base + direction));
          setTime(cues[nextIndex].startMs);
        }, [cues, timeMs, setTime]);

        useEffect(() => {
          const onKeyDown = (event: KeyboardEvent) => {
            const target = event.target as HTMLElement | null;
            const tag = target?.tagName.toLowerCase();
            if (tag === "input" || tag === "textarea" || tag === "select" || target?.isContentEditable) return;
            if (event.key === "ArrowLeft") {
              event.preventDefault();
              jumpCue(-1);
            }
            if (event.key === "ArrowRight") {
              event.preventDefault();
              jumpCue(1);
            }
          };

          window.addEventListener("keydown", onKeyDown);
          return () => window.removeEventListener("keydown", onKeyDown);
        }, [jumpCue]);

        const compactHeight = smallHeight;
        const layoutClass = getLayoutClass(mode, smallHeight);

        return (
          <main className={`app ${layoutClass} ${compactHeight ? "compact-height" : ""}`}>
            <header className="topbar">
              <a className="repo-link" href={REPOSITORY_URL} target="_blank" rel="noopener noreferrer" title="Open Subtitle Def repository">
                <div className="brand">
                  <div className="brand-mark">S</div>
                  <div>
                    <div className="brand-title">{fileName || "Subtitle Def"}</div>
                    <div className="brand-subtitle">{cues.length ? `${cues.length} cues loaded` : "Static SRT subtitle player"}</div>
                  </div>
                </div>
              </a>
              <div className="mode-switch" role="group" aria-label="Display mode">
                {MODE_OPTIONS.map(({ value, label, title }) => (
                  <button
                    key={value}
                    className={`mode-button ${mode === value ? "active" : ""}`}
                    type="button"
                    title={title}
                    onClick={() => setMode(value)}
                  >
                    {label}
                  </button>
                ))}
              </div>
            </header>

            <section className={`stage ${cues.length ? "" : "empty"}`}>
              {cues.length ? (
                <div className="reader">
                  <Lyrics
                    cues={cues}
                    timeMs={timeMs}
                    onJump={setTime}
                    smallHeight={compactHeight}
                    selectedWord={selectedWord}
                    onSelectWord={setSelectedWord}
                  />
                  <DefinitionPanel word={selectedWord} />
                </div>
              ) : (
                <DropZone onLoad={loadFile} error={restoring ? "" : error} />
              )}
            </section>

            <footer className="controls">
              <div className="control-row">
                <div className="time-readout">{formatTime(timeMs)} / {formatTime(durationMs)}</div>
                <div className="button-group">
                  <button className="control-button" type="button" title="Load another SRT" onClick={resetSession}>
                    X
                  </button>
                  <button className="control-button" type="button" title="Previous cue" disabled={!cues.length} onClick={() => jumpCue(-1)}>
                    &lt;&lt;
                  </button>
                  <button className="control-button" type="button" title={playing ? "Pause" : "Play"} disabled={!cues.length} onClick={() => setPlaying((value) => !value)}>
                    {playing ? "Pause" : "Play"}
                  </button>
                  <button className="control-button" type="button" title="Next cue" disabled={!cues.length} onClick={() => jumpCue(1)}>
                    &gt;&gt;
                  </button>
                </div>
                <div className="seek">
                  <input
                    type="range"
                    min="0"
                    max={durationMs || 1}
                    value={Math.min(timeMs, durationMs || 1)}
                    disabled={!cues.length}
                    onChange={(event) => setTime(Number(event.currentTarget.value))}
                  />
                </div>
              </div>
              {warning ? <div className="warning">{warning}</div> : null}
            </footer>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    <script>
      (function runInlineTypescriptApp() {
        const root = document.getElementById("root");
        try {
          const source = document.getElementById("app-source").textContent;
          const compiled = Babel.transform(source, {
            filename: "app.tsx",
            presets: [
              ["typescript", { allExtensions: true, isTSX: true }],
              ["react", { runtime: "classic" }]
            ]
          }).code;
          const script = document.createElement("script");
          script.text = compiled;
          document.body.appendChild(script);
        } catch (error) {
          root.innerHTML = "";
          const message = document.createElement("pre");
          message.style.cssText = "margin:2rem;white-space:pre-wrap;color:#ff756f;font:16px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
          message.textContent = error && error.stack ? error.stack : String(error);
          root.appendChild(message);
          throw error;
        }
      })();
    </script>
  </body>
</html>
